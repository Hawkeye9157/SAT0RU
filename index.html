<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JJK: Cursed Technique</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
    
        #ui {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            color: #fff;
            pointer-events: none;
            z-index: 10;
        }
        
        h1 { 
            font-size: 3rem; margin: 0; letter-spacing: 10px; 
            font-weight: 900; 
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        #technique-name { 
            font-size: 1.2rem; color: #00ffff; margin-top: 15px; 
            font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            transition: color 0.3s ease;
        }

        /* Large Centered Camera Hub - Taller for Reel Context */
        #video-container {
            position: absolute;
            bottom: 2%;
            left: 18%;
            transform: translateX(-50%) scaleX(-1);
            width: 85vw;
            max-width: 450px;
            height: 42vh; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
            background-color: #000; 
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }

        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }

        /* Idle Death Gamble — pulsing void vignette */
        #idle-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
            opacity: 0;
            background: radial-gradient(ellipse at center, rgba(80,0,120,0.3) 0%, transparent 70%);
            transition: opacity 0.5s ease;
        }
        #idle-flash.active {
            animation: idlePulse 2.5s ease-in-out infinite;
        }
        @keyframes idlePulse {
            0%   { opacity: 0; }
            40%  { opacity: 1; }
            60%  { opacity: 0.6; }
            100% { opacity: 0; }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="grain"></div>
    <div id="idle-flash"></div>

    <div id="ui">
        <h1>呪術廻戦</h1>
        <div id="technique-name">CURSED ENERGY</div>
    </div>

    <div id="video-container">
        <video class="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene & Rendering ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 55;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const COUNT = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);
    const sizes = new Float32Array(COUNT);
    
    const targetPositions = new Float32Array(COUNT * 3);
    const targetColors = new Float32Array(COUNT * 3);
    const targetSizes = new Float32Array(COUNT);

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
    scene.add(particles);

    // ─── Technique Functions ─────────────────────────────────────────────────

    function getRed(i) {
        if(i < COUNT * 0.1) {
            const r = Math.random() * 9;
            const theta = Math.random() * 6.28; const phi = Math.acos(2 * Math.random() - 1);
            return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 3, g: 0.1, b: 0.1, s: 2.5 };
        } else {
            const armCount = 3; const t = (i / COUNT); 
            const angle = t * 15 + ((i % armCount) * (Math.PI * 2 / armCount));
            const radius = 2 + (t * 40); 
            return { x: radius * Math.cos(angle), y: radius * Math.sin(angle), z: (Math.random() - 0.5) * (10 * t), r: 0.8, g: 0, b: 0, s: 1.0 };
        }
    }

    function getVoid(i) {
        if (i < COUNT * 0.15) {
            const angle = Math.random() * Math.PI * 2;
            return { x: 26 * Math.cos(angle), y: 26 * Math.sin(angle), z: (Math.random()-0.5) * 1, r: 1, g: 1, b: 1, s: 2.5 };
        } else {
            const radius = 30 + Math.random() * 90;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            return { x: radius * Math.sin(phi) * Math.cos(theta), y: radius * Math.sin(phi) * Math.sin(theta), z: radius * Math.cos(phi), r: 0.1, g: 0.6, b: 1.0, s: 0.7 };
        }
    }

    function getPurple(i) {
        if (Math.random() > 0.8) return { x: (Math.random() - 0.5) * 100, y: (Math.random() - 0.5) * 100, z: (Math.random() - 0.5) * 100, r: 0.5, g: 0.5, b: 0.7, s: 0.8 };
        const r = 20; const theta = Math.random() * Math.PI * 2; const phi = Math.acos(2 * Math.random() - 1);
        return { x: r * Math.sin(phi) * Math.cos(theta), y: r * Math.sin(phi) * Math.sin(theta), z: r * Math.cos(phi), r: 0.6, g: 0.5, b: 1.0, s: 2.5 };
    }

    function getShrine(i) {
        const total = COUNT;
        if (i < total * 0.3) return { x: (Math.random()-0.5)*80, y: -15, z: (Math.random()-0.5)*80, r: 0.4, g: 0, b: 0, s: 0.8 };
        else if (i < total * 0.4) {
            const px = ((i%4)<2?1:-1)*12; const pz = ((i%4)%2==0?1:-1)*8;
            return { x: px+(Math.random()-0.5)*2, y: -15+Math.random()*30, z: pz+(Math.random()-0.5)*2, r: 0.2, g: 0.2, b: 0.2, s: 0.6 };
        } else if (i < total * 0.6) {
            const t = Math.random() * Math.PI * 2; const rad = Math.random() * 30;
            const curve = Math.pow(rad/30, 2) * 10; 
            return { x: rad*Math.cos(t), y: 15 - curve + (Math.random()*2), z: rad*Math.sin(t)*0.6, r: 0.6, g: 0, b: 0, s: 0.6 };
        } else return { x: 0, y: 0, z: 0, r: 0, g: 0, b: 0, s: 0 };
    }

    // IDLE DEATH GAMBLE — Domain Expansion
    function getIdleDeathGamble(i) {
        const total = COUNT;
        // Layer 1: collapsed probability core — hot white-gold singularity
        if (i < total * 0.05) {
            const r = Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const heat = Math.random();
            return { x: r*Math.sin(phi)*Math.cos(theta), y: r*Math.sin(phi)*Math.sin(theta), z: r*Math.cos(phi), r: 1.0, g: heat*0.85, b: heat*0.3, s: 3.5 };
        }
        // Layer 2: fate-horizon ring — sharp violet band
        else if (i < total * 0.15) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 18 + Math.random() * 4;
            return { x: radius*Math.cos(angle), y: radius*Math.sin(angle) + (Math.random()-0.5)*2, z: (Math.random()-0.5)*2, r: 0.7, g: 0.0, b: 1.0, s: 2.0 };
        }
        // Layer 3: 6 probability node clusters — scattered dice-like bursts
        else if (i < total * 0.40) {
            const clusterIndex = Math.floor(Math.random() * 6);
            const clusterAngles = [0, 1.05, 2.09, 3.14, 4.19, 5.24];
            const clusterR = 28 + (clusterIndex % 3) * 6;
            const cx = clusterR * Math.cos(clusterAngles[clusterIndex]);
            const cy = clusterR * Math.sin(clusterAngles[clusterIndex]) * 0.5;
            const cz = (clusterIndex % 2 === 0 ? 1 : -1) * 8;
            return { x: cx+(Math.random()-0.5)*8, y: cy+(Math.random()-0.5)*8, z: cz+(Math.random()-0.5)*8, r: 0.45, g: 0.0, b: 0.65, s: 0.9 };
        }
        // Layer 4: spiral inevitability arms — cursed energy tendrils
        else if (i < total * 0.60) {
            const t = (i - total * 0.40) / (total * 0.20);
            const armOffset = (i % 3) * (Math.PI * 2 / 3);
            const angle = t * 18 + armOffset;
            const radius = 5 + t * 45;
            return { x: radius*Math.cos(angle), y: radius*Math.sin(angle)+(Math.random()-0.5)*(6*t), z: (Math.random()-0.5)*(12*t), r: 0.25, g: 0.0, b: 0.35, s: 0.7 };
        }
        // Layer 5: outer void shroud — deep cosmic death field
        else {
            const radius = 55 + Math.random() * 55;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            return { x: radius*Math.sin(phi)*Math.cos(theta), y: radius*Math.sin(phi)*Math.sin(theta), z: radius*Math.cos(phi), r: 0.12, g: 0.0, b: 0.18, s: 0.5 };
        }
    }

    // AUTHENTIC MUTUAL LOVE — Domain Expansion
    function getAuthenticMutualLove(i) {
        const total = COUNT;
        // Layer 1: Sword blade — tapered white-gold column along Y axis
        if (i < total * 0.15) {
            const t = (i / (total * 0.15));
            const bladeY = -20 + t * 55;
            const thickness = (1 - t) * 1.2 + 0.1;
            const heat = 1 - t * 0.4;
            return { x: (Math.random()-0.5)*thickness, y: bladeY+(Math.random()-0.5)*0.6, z: (Math.random()-0.5)*thickness, r: heat, g: heat*0.92, b: heat*0.6, s: 1.8 - t*1.0 };
        }
        // Layer 2: Crossguard — wide horizontal gold bar at hilt
        else if (i < total * 0.19) {
            return { x: (Math.random()-0.5)*18, y: -14+(Math.random()-0.5)*0.8, z: (Math.random()-0.5)*1.2, r: 1.0, g: 0.82, b: 0.2, s: 1.6 };
        }
        // Layer 3: Diamond gem ring — crisp orbital band, sapphire blue
        else if (i < total * 0.37) {
            const angle = ((i - total * 0.19) / (total * 0.18)) * Math.PI * 2;
            const ringR = 22, tilt = 0.09;
            return { x: ringR*Math.cos(angle), y: ringR*Math.sin(angle)*tilt+(Math.random()-0.5)*0.5, z: ringR*Math.sin(angle), r: 0.05, g: 0.55, b: 1.0, s: 2.2 };
        }
        // Layer 4: Gem sparkle halo — fine cyan motes just outside the ring
        else if (i < total * 0.49) {
            const angle = Math.random() * Math.PI * 2;
            const ringR = 22 + (Math.random()-0.5)*5, tilt = 0.09;
            return { x: ringR*Math.cos(angle), y: ringR*Math.sin(angle)*tilt+(Math.random()-0.5)*2, z: ringR*Math.sin(angle), r: 0.3, g: 0.8, b: 1.0, s: 0.7 };
        }
        // Layer 5: Ambient love field — soft rose-gold sphere
        else {
            const radius = 40 + Math.random()*55, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
            const warmth = Math.random();
            return { x: radius*Math.sin(phi)*Math.cos(theta), y: radius*Math.sin(phi)*Math.sin(theta), z: radius*Math.cos(phi), r: 0.9, g: warmth*0.45, b: warmth*0.55, s: 0.4 };
        }
    }

    // DEADLY SENTENCING — Domain Expansion
    function getDeadlySentencing(i) {
        const total = COUNT;

        const headLen = 16;   // half-length along cylinder axis
        const headR   = 5;    // cylinder radius
        const headCX  = 2;    // slightly right of center
        const headCY  = 6;    // vertical center of cylinder

        // Tilt the cylinder head
        const tiltAng = -Math.PI * 0.22;  
        const tCos = Math.cos(tiltAng), tSin = Math.sin(tiltAng);
        const tiltHead = (lx, ly) => ({
            x: headCX + lx * tCos - ly * tSin,
            y: headCY + lx * tSin + ly * tCos
        });

        // Handle attaches at the exact rotated bottom of the cylinder
        const tiltedBottom = tiltHead(0, -headR);
        const handleStartX = tiltedBottom.x;
        const handleStartY = tiltedBottom.y;
        const handleAng = Math.PI * 1.22; 
        const hCos = Math.cos(handleAng);
        const hSin = Math.sin(handleAng);

        // ── Layer 1: Head cylinder — hollow barrel surface
        if (i < total * 0.20) {
            const lx       = (Math.random() - 0.5) * headLen * 2;
            const cAng     = Math.random() * Math.PI * 2;
            const ly       = Math.cos(cAng) * headR;
            const lz       = Math.sin(cAng) * headR;
            const highlight = Math.max(0, -Math.cos(cAng)) * 0.12;
            const w = tiltHead(lx, ly);
            return {
                x: w.x, y: w.y, z: lz,
                r: 0.40 + highlight, g: 0.20 + highlight, b: 0.04,
                s: 0.85
            };
        }

        // ── Layer 2: End caps — circular disc on each end
        else if (i < total * 0.26) {
            const side   = (i % 2 === 0) ? -headLen : headLen;
            const capAng = Math.random() * Math.PI * 2;
            const capR   = Math.random() * headR;
            const w = tiltHead(side, Math.cos(capAng) * capR);
            return {
                x: w.x, y: w.y,
                z: Math.sin(capAng) * capR,
                r: 0.28, g: 0.13, b: 0.03,
                s: 0.9
            };
        }

        // ── Layer 3: Gold band — proud ring at cylinder center
        else if (i < total * 0.36) {
            const lx    = (Math.random() - 0.5) * 5;
            const cAng  = Math.random() * Math.PI * 2;
            const bandR = headR + 0.6;
            const sheen = 0.65 + Math.max(0, -Math.cos(cAng)) * 0.35;
            const w = tiltHead(lx, Math.cos(cAng) * bandR);
            return {
                x: w.x, y: w.y,
                z: Math.sin(cAng) * bandR,
                r: sheen, g: sheen * 0.76, b: 0.04,
                s: 1.2
            };
        }

        // ── Layer 4: Handle — from bottom of cylinder, angles down-left
        else if (i < total * 0.50) {
            const t      = (i - total * 0.36) / (total * 0.14); // 0=neck, 1=grip
            const dist   = t * 30;            // starts at 0 = exactly at connection point
            const radius = 1.3 - t * 0.85;   // tapers toward grip
            const cAng   = Math.random() * Math.PI * 2;
            // Perpendicular to handle direction (for cross-section thickness)
            const perpX  = -hSin, perpY = hCos;
            const cr     = radius * Math.cos(cAng);
            const lz     = radius * Math.sin(cAng);
            return {
                x: handleStartX + hCos * dist + perpX * cr,
                y: handleStartY + hSin * dist + perpY * cr,
                z: lz,
                r: 0.38 - t * 0.12, g: 0.18 - t * 0.06, b: 0.02,
                s: 1.0 - t * 0.4
            };
        }

        // ── Layer 5: Sound block dome — wide low dome below gavel
        else if (i < total * 0.72) {
            const bAng  = Math.random() * Math.PI * 2;
            const bR    = Math.random() * 20;
            const domeH = Math.sqrt(Math.max(0, 1 - (bR / 20) ** 2)) * 4;
            return {
                x: bR * Math.cos(bAng),
                y: -20 + domeH * Math.random(),
                z: (Math.random() - 0.5) * bR * 0.55,
                r: 0.44, g: 0.22, b: 0.04,
                s: 0.8
            };
        }

        // ── Layer 6: Courtroom void — dim sparse ambient sphere
        else {
            const radius = 50 + Math.random() * 60;
            const theta  = Math.random() * Math.PI * 2;
            const phi    = Math.acos(2 * Math.random() - 1);
            return {
                x: radius * Math.sin(phi) * Math.cos(theta),
                y: radius * Math.sin(phi) * Math.sin(theta),
                z: radius * Math.cos(phi),
                r: 0.05, g: 0.03, b: 0.02,
                s: 0.3
            };
        }
    }

    // ─── Hand Tracking ───────────────────────────────────────────────────────
    let currentTech = 'neutral';
    let shakeIntensity = 0;
    let idleTime = 0;
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const idleFlash = document.getElementById('idle-flash');
    let glowColor = '#00ffff';

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        let detected = 'neutral';

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

            // Draw all detected hands
            results.multiHandLandmarks.forEach((lm) => {
                drawConnectors(canvasCtx, lm, HAND_CONNECTIONS, {color: glowColor, lineWidth: 5});
                drawLandmarks(canvasCtx, lm, {color: '#fff', lineWidth: 1, radius: 2});
            });

            // ── TWO-HAND GESTURES ─────────────────────────────────────────────

            if (results.multiHandLandmarks.length === 2) {
                const lm0 = results.multiHandLandmarks[0];
                const lm1 = results.multiHandLandmarks[1];
                const isUpH = (lm, t, p) => lm[t].y < lm[p].y;

                // Shrine: both index + middle up, fingertips close together
                const bothIndexUp  = isUpH(lm0, 8, 6)  && isUpH(lm1, 8, 6);
                const bothMiddleUp = isUpH(lm0, 12, 10) && isUpH(lm1, 12, 10);
                const tipDist = Math.hypot(lm0[8].x - lm1[8].x, lm0[8].y - lm1[8].y);
                const midDist = Math.hypot(lm0[12].x - lm1[12].x, lm0[12].y - lm1[12].y);
                if (bothIndexUp && bothMiddleUp && tipDist < 0.18 && midDist < 0.22) {
                    detected = 'shrine';
                }

                // Idle Death Gamble: one hand pinching (OK circle), one hand flat
                if (detected === 'neutral') {
                    const isPinch = (lm) => Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y) < 0.07;
                    const isFlat  = (lm) => lm[8].y < lm[6].y && lm[12].y < lm[10].y && lm[16].y < lm[14].y && lm[20].y < lm[18].y;
                    if ((isPinch(lm0) && isFlat(lm1)) || (isPinch(lm1) && isFlat(lm0))) {
                        detected = 'idle';
                    }
                }
            }

            // ── SINGLE-HAND GESTURES ──────────────────────────────────────────
            if (detected === 'neutral') {
                const lm = results.multiHandLandmarks[0];
                const isUp = (t, p) => lm[t].y < lm[p].y;
                const pinch = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);

                if (pinch < 0.04) detected = 'purple';
                // Fist: all four fingers curled — Deadly Sentencing
                else if (!isUp(8,6) && !isUp(12,10) && !isUp(16,14) && !isUp(20,18)) detected = 'sentence';
                // ILY: index + pinky up, middle + ring folded, thumb extended
                else if (
                    isUp(8, 6) && isUp(20, 18) && !isUp(12, 10) && !isUp(16, 14) &&
                    Math.hypot(lm[4].x - lm[0].x, lm[4].y - lm[0].y) > 0.25
                ) detected = 'love';
                // Void: index + middle up, ring down
                else if (isUp(8,6) && isUp(12,10) && !isUp(16,14)) detected = 'void';
                // Red: index up only, pinky down (guards against ILY)
                else if (isUp(8,6) && !isUp(12,10) && !isUp(20,18)) detected = 'red';
            }
        }
        updateState(detected);
    });

    function updateState(tech) {
        if(currentTech === tech) return;
        currentTech = tech;
        const nameEl = document.getElementById('technique-name');
        shakeIntensity = tech !== 'neutral' ? 0.4 : 0;
        idleTime = 0;

        if(tech === 'shrine')   { glowColor = '#ff0000'; nameEl.style.color = '#ff3333'; nameEl.innerText = "Domain Expansion: Malevolent Shrine";     bloomPass.strength = 2.5; idleFlash.classList.remove('active'); }
        else if(tech === 'purple')   { glowColor = '#bb00ff'; nameEl.style.color = '#cc66ff'; nameEl.innerText = "Secret Technique: Hollow Purple";           bloomPass.strength = 4.0; idleFlash.classList.remove('active'); }
        else if(tech === 'void')     { glowColor = '#00ffff'; nameEl.style.color = '#00ffff'; nameEl.innerText = "Domain Expansion: Infinite Void";           bloomPass.strength = 2.0; idleFlash.classList.remove('active'); }
        else if(tech === 'red')      { glowColor = '#ff3333'; nameEl.style.color = '#ff4444'; nameEl.innerText = "Reverse Cursed Technique: Red";             bloomPass.strength = 2.5; idleFlash.classList.remove('active'); }
        else if(tech === 'idle')     { glowColor = '#aa00ff'; nameEl.style.color = '#9933ff'; nameEl.innerText = "Domain Expansion: Idle Death Gamble";       bloomPass.strength = 3.5; idleFlash.classList.add('active');    }
        else if(tech === 'love')     { glowColor = '#66ccff'; nameEl.style.color = '#88ddff'; nameEl.innerText = "Domain Expansion: Authentic Mutual Love";   bloomPass.strength = 3.0; idleFlash.classList.remove('active'); }
        else if(tech === 'sentence') { glowColor = '#ffaa33'; nameEl.style.color = '#ffbb55'; nameEl.innerText = "Domain Expansion: Deadly Sentencing";       bloomPass.strength = 0.6; idleFlash.classList.remove('active'); }
        else { glowColor = '#00ffff'; nameEl.style.color = '#00ffff'; nameEl.innerText = "Neutral State"; bloomPass.strength = 1.0; idleFlash.classList.remove('active'); }

        for(let i=0; i<COUNT; i++) {
            let p;
            if(tech === 'neutral') {
                if(i < COUNT * 0.05) {
                    const r = 15 + Math.random()*20; const t = Math.random()*6.28; const ph = Math.random()*3.14;
                    p = { x: r*Math.sin(ph)*Math.cos(t), y: r*Math.sin(ph)*Math.sin(t), z: r*Math.cos(ph), r: 0.1, g: 0.1, b: 0.2, s: 0.4 };
                } else p = { x:0, y:0, z:0, r:0, g:0, b:0, s:0 };
            }
            else if(tech === 'red')      p = getRed(i);
            else if(tech === 'void')     p = getVoid(i);
            else if(tech === 'purple')   p = getPurple(i);
            else if(tech === 'shrine')   p = getShrine(i);
            else if(tech === 'idle')     p = getIdleDeathGamble(i);
            else if(tech === 'love')     p = getAuthenticMutualLove(i);
            else if(tech === 'sentence') p = getDeadlySentencing(i);
            
            targetPositions[i*3] = p.x; targetPositions[i*3+1] = p.y; targetPositions[i*3+2] = p.z;
            targetColors[i*3] = p.r; targetColors[i*3+1] = p.g; targetColors[i*3+2] = p.b;
            targetSizes[i] = p.s;
        }
    }

    const cameraUtils = new Camera(videoElement, {
        onFrame: async () => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            await hands.send({image: videoElement});
        }, width: 640, height: 480
    });
    cameraUtils.start();

    // ─── Animation Loop ──────────────────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);
        idleTime += 0.01;
        
        if (shakeIntensity > 0) {
            renderer.domElement.style.transform = `translate(${(Math.random()-0.5)*shakeIntensity*40}px, ${(Math.random()-0.5)*shakeIntensity*40}px)`;
        } else {
            renderer.domElement.style.transform = 'translate(0,0)';
        }

        const pos = particles.geometry.attributes.position.array;
        const col = particles.geometry.attributes.color.array;
        const siz = particles.geometry.attributes.size.array;

        for(let i=0; i<COUNT*3; i++) {
            pos[i] += (targetPositions[i] - pos[i]) * 0.1;
            col[i] += (targetColors[i] - col[i]) * 0.1;
        }
        for(let i=0; i<COUNT; i++) siz[i] += (targetSizes[i] - siz[i]) * 0.1;

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;
        particles.geometry.attributes.size.needsUpdate = true;
        
        if(currentTech === 'red') {
            particles.rotation.z -= 0.1;
        } else if (currentTech === 'purple') {
            particles.rotation.z += 0.2; 
            particles.rotation.y += 0.05;
        } else if (currentTech === 'shrine') {
            // FORCE UPRIGHT: Reset and freeze all rotations
            particles.rotation.set(0, 0, 0); 
        } else if (currentTech === 'idle') {
            // Slow ominous anti-clockwise precession — fate turning backward
            particles.rotation.y -= 0.008;
            particles.rotation.z += 0.003;
            bloomPass.strength = 3.0 + Math.sin(idleTime * 2.2) * 1.2;
        } else if (currentTech === 'love') {
            // Ring orbits around the sword's Y axis
            particles.rotation.y += 0.012;
            bloomPass.strength = 2.8 + Math.sin(idleTime * 1.8) * 0.5;
        } else if (currentTech === 'sentence') {
            // Gavel frozen mid-swing — lock all rotation so the shape reads clearly
            particles.rotation.set(0, 0, 0);
            bloomPass.strength = 0.6;
        } else {
            // Default neutral rotation
            particles.rotation.y += 0.005;
        }

        composer.render();
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
